name: Deploy
on:
  push:
    branches:
      - main
jobs:
  docker:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Copy credentials
        run: |
          echo "${{ secrets.FIREBASE_CREDENTIALS }}" > src/storage/app/careflow-83b22-firebase-adminsdk-fbsvc-f9c4d19efd.json
      - name: Build App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          target: production
          push: true
          tags: abbeylink/care-flow-app:${{ github.sha }},abbeylink/care-flow-app:latest
          build-args: |
            VITE_REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}
            VITE_REVERB_HOST=app.a2smglobal.com.ng
            VITE_REVERB_PORT=443
            VITE_REVERB_SCHEME=https
          cache-from: type=registry,ref=abbeylink/care-flow-app:latest
          cache-to: type=inline
      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: abbeylink/care-flow-nginx:${{ github.sha }},abbeylink/care-flow-nginx:latest
          cache-from: type=registry,ref=abbeylink/care-flow-nginx:latest
          cache-to: type=inline
      - name: Deploy
        run: |
          cd /home/bamavalon
          export APP_TAG=${{ github.sha }}
          docker compose -f docker-compose.care-flow.yaml pull
          docker compose -f docker-compose.care-flow.yaml up -d
          docker image prune -f
          docker exec care-flow-app php artisan migrate --force
          docker exec care-flow-app php artisan optimize:clear